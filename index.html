  bg:'#EEF2FF',card:'#FFFFFF',
  pri:'#4263EB',pri2:'#748FFC',priL:'#E8EDFF',
  mus:'#E03131',bod:'#B8CDE0',
  txt:'#1C2340',sub:'#6B7AA1',bdr:'#DDE5F5',
  ok:'#2F9E44',okL:'#D3F9D8',
  warn:'#E8590C',
  sh:'0 2px 16px rgba(59,91,219,0.08)',

const PRESETS={
  upper:['側平舉','飛鳥','肩推','胸推','夾胸','下拉','三頭下壓','二頭彎舉','划船'],
  lower:['深蹲','硬舉','腿推','腿伸展'],
};
const DR=90,DREPS=10,DS=4,SK='fitness_v7';
const p2=n=>String(n).padStart(2,'0');
const fT=s=>`${p2(Math.floor(s/60))}:${p2(s%60)}`;
function tKey(){const d=new Date();return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function fDL(k){const[y,m,d]=k.split('-');const dt=new Date(+y,+m-1,+d);return`${y}/${m}/${d}（週${'日一二三四五六'[dt.getDay()]}）`;}
const uid=()=>`${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
const nSet=(o={})=>({id:uid(),weight:0,reps:DREPS,rest:DR,done:false,...o});
const nEx=(name='')=>({id:uid(),name,sets:Array.from({length:DS},()=>nSet())});

function useMob(){
  const[m,sm]=useState(()=>window.innerWidth<768);
  useEffect(()=>{const f=()=>sm(window.innerWidth<768);window.addEventListener('resize',f);return()=>window.removeEventListener('resize',f);},[]);
  return m;
}

/* ── Rest Timer ──────────────────────────────────────────────────── */
function RestTimer({seconds,onDone,onSkip}){
  const[rem,setRem]=useState(seconds);
  const ref=useRef();
  useEffect(()=>{
    ref.current=setInterval(()=>{setRem(r=>{if(r<=1){clearInterval(ref.current);onDone();return 0;}return r-1;});},1000);
    return()=>clearInterval(ref.current);
  },[]);
  const R=62,circ=2*Math.PI*R,prog=((seconds-rem)/seconds)*circ;
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(28,35,64,0.93)',zIndex:3000,
      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
      backdropFilter:'blur(16px)',WebkitBackdropFilter:'blur(16px)',
      paddingBottom:'max(env(safe-area-inset-bottom),24px)'}}>
      <div style={{background:'rgba(255,255,255,0.07)',borderRadius:24,padding:'36px 48px',
        display:'flex',flexDirection:'column',alignItems:'center',gap:20}}>
        <div style={{fontWeight:800,color:'rgba(255,255,255,0.4)',fontSize:11,letterSpacing:5}}>組間休息</div>
        <div style={{position:'relative',width:156,height:156}}>
          <svg width="156" height="156" style={{transform:'rotate(-90deg)',position:'absolute'}}>
            <circle cx="78" cy="78" r={R} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="10"/>
            <circle cx="78" cy="78" r={R} fill="none" stroke={C.pri2} strokeWidth="10"
              strokeDasharray={`${prog} ${circ}`} strokeLinecap="round"
              style={{transition:'stroke-dasharray 0.9s linear'}}/>
          </svg>
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',
            alignItems:'center',justifyContent:'center'}}>
            <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:64,color:'#fff',lineHeight:1}}>{rem}</span>
            <span style={{color:'rgba(255,255,255,0.35)',fontSize:12,fontWeight:700,letterSpacing:2}}>秒</span>
          </div>
        </div>
        <div style={{display:'flex',gap:8}}>
          {[[-15,'−15s'],[+15,'+15s']].map(([d,l])=>(
            <button key={l} onClick={()=>setRem(r=>Math.max(0,r+d))} className="b-hov"
              style={{background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.15)',
                color:'rgba(255,255,255,0.7)',padding:'0 20px',height:44,borderRadius:10,fontWeight:700,fontSize:14,cursor:'pointer'}}>{l}</button>
          ))}
        </div>
        <button onClick={onSkip} className="b-hov"
          style={{background:C.pri,border:'none',color:'#fff',height:48,padding:'0 40px',borderRadius:12,fontWeight:800,fontSize:15,cursor:'pointer'}}>
          跳過休息
        </button>
      </div>
    </div>
  );
}

/* ── Stepper ─────────────────────────────────────────────────────── */
// isMobile: smaller buttons + input; desktop: larger
function Stepper({label,value,onChange,step=1,unit='',color=C.txt,mob=true}){
  const bs=mob?24:30; // button size
  const iw=mob?38:50; // input width
  const fs=mob?20:24; // font size
  const dec=()=>onChange(Math.round(Math.max(0,parseFloat(value)-step)*100)/100);
  const inc=()=>onChange(Math.round((parseFloat(value)+step)*100)/100);
  const Btn=({fn,ch})=>(
    <button onClick={fn} style={{
      width:bs,height:bs,background:C.bg,border:`1.5px solid ${C.bdr}`,
      color:C.sub,cursor:'pointer',fontSize:mob?15:18,borderRadius:mob?5:7,
      flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',
      fontWeight:800,padding:0,lineHeight:1}}>{ch}</button>
  );
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:1,minWidth:0}}>
      <span style={{color:C.sub,fontSize:mob?9:10,fontWeight:800,letterSpacing:1,
        textTransform:'uppercase',whiteSpace:'nowrap'}}>{label}</span>
      <div style={{display:'flex',alignItems:'center',gap:mob?1:3}}>
        <Btn fn={dec} ch="−"/>
        <input type="number" value={value} onChange={e=>onChange(e.target.value)}
          style={{width:iw,textAlign:'center',background:'transparent',border:'none',
            borderBottom:`2px solid ${C.bdr}`,color,
            fontFamily:"'Bebas Neue',sans-serif",fontSize:fs,outline:'none',
            padding:'0',minWidth:0,display:'block'}}/>
        <Btn fn={inc} ch="+"/>
      </div>
      {unit&&<span style={{color:C.bdr,fontSize:mob?9:10,fontWeight:700}}>{unit}</span>}
    </div>
  );
}

/* ── Set Row ─────────────────────────────────────────────────────── */
function SetRow({set,idx,onChange,onDelete,onDone,mob=true}){
  // Mobile: action buttons stacked in narrow column
  // Desktop: larger buttons side by side
  const actW=mob?56:80;
  return(
    <div style={{
      display:'grid',
      gridTemplateColumns:`${mob?16:22}px 1fr 1fr 1fr ${actW}px`,
      gap:mob?3:10,alignItems:'center',
      padding:mob?'9px 4px':'12px 8px',
      background:set.done?C.priL:'rgba(238,242,255,0.38)',
      borderLeft:`3px solid ${set.done?C.pri:'transparent'}`,
      borderRadius:8,marginBottom:4,transition:'border-color .25s,background .25s'
    }}>
      <span style={{color:C.bdr,fontWeight:800,fontSize:mob?11:13,textAlign:'center'}}>{idx+1}</span>
      <Stepper label="重量" value={set.weight} onChange={v=>onChange({...set,weight:v})} step={2.5} unit="kg" mob={mob}/>
      <Stepper label="次數" value={set.reps}   onChange={v=>onChange({...set,reps:v})}   step={1}   unit="次" mob={mob}/>
      <Stepper label="休息" value={set.rest}   onChange={v=>onChange({...set,rest:v})}   step={15}  unit="秒" color={C.warn} mob={mob}/>
      {/* Action column — guaranteed to be visible */}
      <div style={{display:'flex',flexDirection:mob?'column':'row',
        gap:mob?4:6,alignItems:'center',justifyContent:'center',
        flexShrink:0,width:actW}}>
        <button onClick={()=>onDone(set)} className="b-hov"
          style={{width:mob?26:34,height:mob?26:34,flexShrink:0,
            background:set.done?C.pri:'transparent',
            border:`1.5px solid ${set.done?C.pri:C.bdr}`,
            color:set.done?'#fff':C.sub,cursor:'pointer',
            borderRadius:mob?6:8,fontSize:mob?12:14,
            display:'flex',alignItems:'center',justifyContent:'center',
            transition:'all .2s'}}>✓</button>
        <button onClick={onDelete} className="b-hov"
          style={{width:mob?26:34,height:mob?26:34,flexShrink:0,
            background:'transparent',border:`1.5px solid ${C.bdr}`,
            color:C.bdr,cursor:'pointer',
            borderRadius:mob?6:8,fontSize:mob?14:16,
            display:'flex',alignItems:'center',justifyContent:'center',
            transition:'color .2s'}}>×</button>
      </div>
    </div>
  );
}

/* ── Exercise Card ───────────────────────────────────────────────── */
function ExCard({ex,onUpdate,onDelete,onSetDone,mob}){
  const[collapsed,setCollapsed]=useState(false);
  const[presetOpen,setPresetOpen]=useState(!ex.name);
  const done=ex.sets.filter(s=>s.done).length;
  const total=ex.sets.length;
  const vol=ex.sets.reduce((s,x)=>s+(parseFloat(x.weight)||0)*(parseInt(x.reps)||0),0);
  const addSet=()=>{const l=ex.sets[ex.sets.length-1]||{};onUpdate({...ex,sets:[...ex.sets,nSet({weight:l.weight||0,reps:l.reps||DREPS,rest:l.rest||DR})]});};
  const iSz=mob?50:62;
  return(
    <div className="c-hov" style={{background:C.card,borderRadius:16,marginBottom:14,overflow:'hidden',boxShadow:C.sh}}>
      {/* Header */}
      <div style={{padding:mob?'12px':'16px'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:iSz,height:iSz,background:C.bg,borderRadius:12,flexShrink:0,
            border:`1.5px solid ${C.bdr}`,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <MI name={ex.name} size={Math.round(iSz*0.78)}/>
          </div>
          <div style={{flex:1,minWidth:0,cursor:'pointer'}} onClick={()=>setCollapsed(c=>!c)}>
            <div style={{fontWeight:800,fontSize:mob?16:19,color:C.txt,
              overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:2}}>
              {ex.name||<span style={{color:C.bdr}}>請選擇動作</span>}
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
              <span style={{background:C.priL,color:C.pri,fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:6}}>{done}/{total} 組</span>
              {vol>0&&<span style={{color:C.sub,fontSize:12,fontWeight:600}}>{vol}kg</span>}
            </div>
            <div style={{height:3,background:C.bg,borderRadius:2,overflow:'hidden',marginTop:7}}>
              <div style={{width:`${total?(done/total)*100:0}%`,height:'100%',background:C.pri,borderRadius:2,transition:'width .4s ease'}}/>
            </div>
          </div>
          <button onClick={e=>{e.stopPropagation();onDelete();}} className="b-hov"
            style={{width:36,height:36,background:C.bg,border:`1.5px solid ${C.bdr}`,
              color:C.sub,cursor:'pointer',borderRadius:10,flexShrink:0,
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🗑</button>
          <span style={{color:C.bdr,fontSize:12,cursor:'pointer',flexShrink:0,
            transform:collapsed?'rotate(0)':'rotate(180deg)',transition:'transform .3s',userSelect:'none'}}
            onClick={()=>setCollapsed(c=>!c)}>▲</span>
        </div>
      </div>
      {!collapsed&&(
        <div style={{borderTop:`1px solid ${C.bg}`,padding:'12px 12px 14px'}}>
          <input value={ex.name} onChange={e=>onUpdate({...ex,name:e.target.value})}
            placeholder="輸入動作名稱..."
            style={{width:'100%',background:C.bg,border:'none',borderRadius:8,
              color:C.txt,fontSize:13,fontWeight:600,outline:'none',padding:'8px 12px',marginBottom:10}}/>
          <button onClick={()=>setPresetOpen(o=>!o)} className="b-hov"
            style={{background:presetOpen?C.priL:'transparent',border:`1.5px solid ${presetOpen?C.pri:C.bdr}`,
              color:presetOpen?C.pri:C.sub,padding:'0 14px',height:34,fontSize:12,fontWeight:700,
              cursor:'pointer',borderRadius:8,marginBottom:presetOpen?10:0,transition:'all .2s'}}>
            {presetOpen?'▲ 收起動作庫':'▼ 展開動作庫'}
          </button>
          {presetOpen&&(
            <div style={{background:C.bg,borderRadius:12,padding:'12px',marginBottom:12}}>
              {[['🏋️ 上半身','upper'],['🦵 下半身','lower']].map(([label,key])=>(
                <div key={key} style={{marginBottom:10}}>
                  <div style={{color:C.sub,fontSize:10,fontWeight:800,letterSpacing:2,marginBottom:8,textTransform:'uppercase'}}>{label}</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {PRESETS[key].map(p=>(
                      <button key={p} className="pb b-hov"
                        onClick={()=>{onUpdate({...ex,name:p});setPresetOpen(false);}}
                        style={{display:'flex',alignItems:'center',gap:6,padding:'6px 10px',
                          background:ex.name===p?C.pri:C.card,border:`1.5px solid ${ex.name===p?C.pri:C.bdr}`,
                          color:ex.name===p?'#fff':C.txt,fontSize:12,fontWeight:700,cursor:'pointer',
                          borderRadius:10,transition:'all .15s',minHeight:38,boxShadow:C.sh}}>
                        <MI name={p} size={22}/>{p}
                      </button>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
          {/* Column headers */}
          <div style={{display:'grid',gridTemplateColumns:`${mob?16:22}px 1fr 1fr 1fr ${mob?56:80}px`,
            gap:mob?3:10,padding:'0 4px 6px',borderBottom:`1px solid ${C.bg}`,marginBottom:6}}>
            {['#','重量','次數','休息',''].map((h,i)=>(
              <span key={i} style={{color:C.bdr,fontSize:9,fontWeight:800,
                letterSpacing:1,textAlign:'center',textTransform:'uppercase'}}>{h}</span>
            ))}
          </div>
          {ex.sets.map((set,idx)=>(
            <SetRow key={set.id} set={set} idx={idx} mob={mob}
              onChange={u=>onUpdate({...ex,sets:ex.sets.map(s=>s.id===set.id?u:s)})}
              onDelete={()=>onUpdate({...ex,sets:ex.sets.filter(s=>s.id!==set.id)})}
              onDone={s=>onSetDone(ex.id,s)}/>
          ))}
          <button onClick={addSet} className="b-hov"
            style={{marginTop:8,width:'100%',background:'transparent',border:`1.5px dashed ${C.bdr}`,
              color:C.sub,height:40,fontWeight:700,fontSize:13,cursor:'pointer',borderRadius:10}}>
            + 新增組數
          </button>
        </div>
      )}
    </div>
  );
}

/* ── History ─────────────────────────────────────────────────────── */
function HDet({dateKey,record,onBack}){
  const vol=record.exercises.reduce((s,e)=>s+e.sets.reduce((ss,x)=>ss+(parseFloat(x.weight)||0)*(parseInt(x.reps)||0),0),0);
  return(
    <div style={{overflowY:'auto',maxWidth:860,margin:'0 auto',padding:'16px 14px 80px'}}>
      <button onClick={onBack} className="b-hov" style={{background:'transparent',border:'none',color:C.sub,fontWeight:700,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',gap:6,minHeight:44,padding:'8px 0'}}>← 返回歷史</button>
      <div style={{fontWeight:900,fontSize:26,color:C.txt,marginBottom:4}}>{record.name}</div>
      <div style={{color:C.pri,fontWeight:700,fontSize:13,marginBottom:16}}>{fDL(dateKey)}</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:24}}>
        {[['⏱',fT(record.duration||0),'時長'],['🏋️',`${vol}kg`,'訓練量'],['📋',`${record.exercises.length}個`,'動作']].map(([ic,v,l])=>(
          <div key={l} style={{background:C.card,borderRadius:12,padding:'12px 8px',textAlign:'center',boxShadow:C.sh}}>
            <div style={{fontSize:20,marginBottom:2}}>{ic}</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:C.pri}}>{v}</div>
            <div style={{color:C.sub,fontSize:11,fontWeight:700}}>{l}</div>
          </div>
        ))}
      </div>
      {record.exercises.map((ex,ei)=>{
        const eV=ex.sets.reduce((s,x)=>s+(parseFloat(x.weight)||0)*(parseInt(x.reps)||0),0);
        return(
          <div key={ei} style={{background:C.card,borderRadius:14,marginBottom:12,overflow:'hidden',boxShadow:C.sh}}>
            <div style={{padding:'12px 14px',display:'flex',alignItems:'center',gap:10,borderBottom:`1px solid ${C.bg}`}}>
              <div style={{width:38,height:38,background:C.bg,borderRadius:9,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}><MI name={ex.name} size={28}/></div>
              <span style={{fontWeight:800,fontSize:15,color:C.txt,flex:1}}>{ex.name}</span>
              <span style={{color:C.pri,fontWeight:700,fontSize:13}}>{eV}kg</span>
            </div>
            <div style={{padding:'8px 14px'}}>
              <div style={{display:'grid',gridTemplateColumns:'24px 1fr 1fr 1fr',gap:8,padding:'4px 0 8px',borderBottom:`1px solid ${C.bg}`,marginBottom:6}}>
                {['組','重量','次數','訓練量'].map(h=><span key={h} style={{color:C.bdr,fontSize:10,fontWeight:800,letterSpacing:1}}>{h}</span>)}
              </div>
              {ex.sets.map((s,si)=>(
                <div key={si} style={{display:'grid',gridTemplateColumns:'24px 1fr 1fr 1fr',gap:8,padding:'7px 0',borderBottom:`1px solid ${C.bg}`}}>
                  <span style={{color:C.bdr,fontWeight:700,fontSize:12}}>{si+1}</span>
                  <span style={{color:C.txt,fontFamily:"'Bebas Neue',sans-serif",fontSize:22}}>{s.weight}<span style={{color:C.bdr,fontSize:11}}> kg</span></span>
                  <span style={{color:C.txt,fontFamily:"'Bebas Neue',sans-serif",fontSize:22}}>{s.reps}<span style={{color:C.bdr,fontSize:11}}> 次</span></span>
                  <span style={{color:C.pri,fontWeight:700,fontSize:13,alignSelf:'center'}}>{((parseFloat(s.weight)||0)*(parseInt(s.reps)||0)).toFixed(0)}kg</span>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function HList({history,onBack}){
  const[sel,setSel]=useState(null);
  const keys=Object.keys(history).sort((a,b)=>b.localeCompare(a));
  if(sel)return<HDet dateKey={sel} record={history[sel]} onBack={()=>setSel(null)}/>;
  return(
    <div style={{overflowY:'auto',maxWidth:860,margin:'0 auto',padding:'16px 14px 80px'}}>
      <button onClick={onBack} className="b-hov" style={{background:'transparent',border:'none',color:C.sub,fontWeight:700,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',gap:6,minHeight:44,padding:'8px 0'}}>← 返回訓練</button>
      <div style={{fontWeight:900,fontSize:24,color:C.txt,marginBottom:20}}>訓練歷史 📋</div>
      {keys.length===0&&(
        <div style={{textAlign:'center',marginTop:80,color:C.bdr}}>
          <div style={{fontSize:52,marginBottom:16}}>📋</div>
          <div style={{fontSize:14,fontWeight:700}}>尚無訓練記錄</div>
          <div style={{fontSize:12,marginTop:6}}>完成訓練後點擊「儲存今日記錄」</div>
        </div>
      )}
      {keys.map(k=>{
        const rec=history[k];
        const vol=rec.exercises.reduce((s,e)=>s+e.sets.reduce((ss,x)=>ss+(parseFloat(x.weight)||0)*(parseInt(x.reps)||0),0),0);
        const sets=rec.exercises.reduce((s,e)=>s+e.sets.length,0);
        const isT=k===tKey();
        return(
          <div key={k} onClick={()=>setSel(k)} className="c-hov"
            style={{background:C.card,border:`1.5px solid ${isT?C.pri:C.bdr}`,
              borderRadius:14,padding:'14px 16px',marginBottom:10,cursor:'pointer',
              display:'flex',alignItems:'center',gap:12,boxShadow:C.sh}}>
            <div style={{display:'flex',gap:4,flexShrink:0}}>
              {rec.exercises.slice(0,3).map((ex,i)=>(
                <div key={i} style={{width:34,height:34,background:C.bg,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',border:`1px solid ${C.bdr}`}}><MI name={ex.name} size={24}/></div>
              ))}
              {rec.exercises.length>3&&(
                <div style={{width:34,height:34,background:C.priL,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',color:C.pri,fontSize:11,fontWeight:800,border:`1px solid ${C.pri}`}}>+{rec.exercises.length-3}</div>
              )}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
                <span style={{fontWeight:800,fontSize:15,color:C.txt,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{rec.name}</span>
                {isT&&<span style={{fontSize:10,color:C.pri,fontWeight:800,background:C.priL,padding:'1px 7px',borderRadius:6,flexShrink:0}}>今天</span>}
              </div>
              <div style={{color:C.sub,fontSize:12,fontWeight:600}}>{fDL(k)}</div>
              <div style={{color:C.bdr,fontSize:11,fontWeight:600,marginTop:2}}>{rec.exercises.length} 個動作 · {sets} 組 · {fT(rec.duration||0)}</div>
            </div>
            <div style={{textAlign:'right',flexShrink:0}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:C.pri,lineHeight:1}}>{vol}</div>
              <div style={{color:C.sub,fontSize:11,fontWeight:700}}>kg</div>
            </div>
            <span style={{color:C.bdr,fontSize:20,flexShrink:0}}>›</span>
          </div>
        );
      })}
    </div>
  );
}

/* ── App ─────────────────────────────────────────────────────────── */
function App(){
  const mob=useMob();
  const[history,setHist]=useState(()=>{try{return JSON.parse(localStorage.getItem(SK)||'{}');}catch{return{};}});
  const[view,setView]=useState('workout');
  const[exercises,setEx]=useState(()=>[nEx()]);
  const[wName,setWName]=useState('今日訓練');
  const[timer,setTimer]=useState(null);
  const[t0]=useState(Date.now());
  const[elapsed,setEl]=useState(0);
  const[sv,setSv]=useState('idle');
  const[showAS,setAS]=useState(false);

  useEffect(()=>{const t=setInterval(()=>setEl(Math.floor((Date.now()-t0)/1000)),1000);return()=>clearInterval(t);},[t0]);

  const save=()=>{
    const key=tKey();
    const next={...history,[key]:{name:wName,exercises,duration:elapsed,savedAt:Date.now()}};
    setHist(next);try{localStorage.setItem(SK,JSON.stringify(next));}catch{}
    setSv('saved');setTimeout(()=>setSv('idle'),3200);
  };

  const onSetDone=(exId,set)=>{
    const nd=!set.done;
    setEx(p=>p.map(e=>e.id===exId?{...e,sets:e.sets.map(s=>s.id===set.id?{...s,done:nd}:s)}:e));
    if(nd&&parseInt(set.rest)>0)setTimer({seconds:parseInt(set.rest)});
  };

  const totS=exercises.reduce((s,e)=>s+e.sets.length,0);
  const doneS=exercises.reduce((s,e)=>s+e.sets.filter(x=>x.done).length,0);
  const totV=exercises.reduce((s,e)=>s+e.sets.reduce((ss,x)=>ss+(parseFloat(x.weight)||0)*(parseInt(x.reps)||0),0),0);
  const pct=totS?(doneS/totS)*100:0;
  const isIOS=/iPhone|iPad/.test(navigator.userAgent);
  const isStd=!!window.navigator.standalone;
  const cp=mob?'14px':'32px';
  const mw=mob?700:920;
  const rSz=mob?14:18; // ring radius for progress

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      {/* ── Header ── */}
      <div style={{position:'sticky',top:0,zIndex:200,background:'rgba(255,255,255,0.96)',
        backdropFilter:'blur(14px)',WebkitBackdropFilter:'blur(14px)',
        borderBottom:`1px solid ${C.bdr}`,boxShadow:'0 1px 12px rgba(66,99,235,0.07)'}}>
        <div style={{maxWidth:mw,margin:'0 auto',padding:`0 ${cp}`}}>
          <div style={{display:'flex',alignItems:'center',gap:mob?8:12,padding:`${mob?'11px':'15px'} 0`}}>
            <div style={{width:mob?38:46,height:mob?38:46,flexShrink:0,
              background:`linear-gradient(135deg,${C.pri},${C.pri2})`,
              borderRadius:mob?12:14,display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:mob?22:28,boxShadow:`0 4px 14px ${C.pri}44`}}>💪</div>
            <div style={{flex:1,minWidth:0}}>
              <input value={wName} onChange={e=>setWName(e.target.value)}
                style={{background:'transparent',border:'none',color:C.txt,fontWeight:900,
                  fontSize:mob?17:21,outline:'none',width:'100%',minWidth:0,padding:0}}/>
              <div style={{color:C.pri,fontSize:mob?11:13,fontWeight:700,letterSpacing:1}}>⏱ {fT(elapsed)}</div>
            </div>
            {/* progress ring */}
            <svg width={mob?36:44} height={mob?36:44} style={{transform:'rotate(-90deg)',flexShrink:0}}>
              <circle cx={mob?18:22} cy={mob?18:22} r={rSz} fill="none" stroke={C.bdr} strokeWidth="3.5"/>
              <circle cx={mob?18:22} cy={mob?18:22} r={rSz} fill="none" stroke={C.pri} strokeWidth="3.5"
                strokeDasharray={`${(pct/100)*(2*Math.PI*rSz).toFixed(1)} ${(2*Math.PI*rSz).toFixed(1)}`}
                strokeLinecap="round" style={{transition:'stroke-dasharray .5s ease'}}/>
            </svg>
            <div style={{display:'flex',gap:mob?4:6}}>
              {[['workout','訓練'],['history','歷史']].map(([v,l])=>(
                <button key={v} onClick={()=>setView(v)} className="b-hov"
                  style={{background:view===v?C.pri:'transparent',border:`1.5px solid ${view===v?C.pri:C.bdr}`,
                    color:view===v?'#fff':C.sub,height:mob?34:40,padding:`0 ${mob?'11px':'18px'}`,
                    fontWeight:700,fontSize:mob?13:15,cursor:'pointer',borderRadius:9,transition:'all .2s'}}>{l}</button>
              ))}
            </div>
            <button onClick={()=>setAS(true)} className="b-hov"
              style={{width:mob?32:38,height:mob?32:38,background:C.bg,border:`1.5px solid ${C.bdr}`,
                color:C.sub,borderRadius:9,cursor:'pointer',fontSize:mob?13:15,fontWeight:800,
                flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>?</button>
          </div>
        </div>
        {/* Stats strip */}
        {view==='workout'&&(
          <div style={{background:C.priL,borderTop:`1px solid ${C.bdr}`}}>
            <div style={{maxWidth:mw,margin:'0 auto',display:'flex',padding:`${mob?'7px':'9px'} ${cp}`,gap:mob?18:40}}>
              {[['動作',exercises.length],['總組數',totS],['完成',`${doneS}/${totS}`],['訓練量',totV?`${totV}kg`:'—']].map(([l,v])=>(
                <div key={l}>
                  <div style={{color:C.pri,fontFamily:"'Bebas Neue',sans-serif",fontSize:mob?21:28,lineHeight:1}}>{v}</div>
                  <div style={{color:C.pri2,fontSize:mob?9:10,fontWeight:800,letterSpacing:1.5,textTransform:'uppercase'}}>{l}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* ── Content ── */}
      {view==='history'?<HList history={history} onBack={()=>setView('workout')}/>:(
        <div style={{maxWidth:mw,margin:'0 auto',padding:`16px ${cp} 100px`}}>
          {/* Desktop 2-col, mobile 1-col */}
          {mob?(
            exercises.map(ex=>(
              <ExCard key={ex.id} ex={ex} mob={true}
                onUpdate={u=>setEx(p=>p.map(e=>e.id===u.id?u:e))}
                onDelete={()=>setEx(p=>p.filter(e=>e.id!==ex.id))}
                onSetDone={onSetDone}/>
            ))
          ):(
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18,marginBottom:4}}>
              {exercises.map(ex=>(
                <ExCard key={ex.id} ex={ex} mob={false}
                  onUpdate={u=>setEx(p=>p.map(e=>e.id===u.id?u:e))}
                  onDelete={()=>setEx(p=>p.filter(e=>e.id!==ex.id))}
                  onSetDone={onSetDone}/>
              ))}
            </div>
          )}
          <button onClick={()=>setEx(p=>[...p,nEx()])} className="b-hov"
            style={{width:'100%',background:C.card,border:`2px dashed ${C.bdr}`,
              color:C.sub,height:mob?50:58,fontWeight:800,fontSize:mob?14:17,
              cursor:'pointer',borderRadius:14,marginBottom:10,boxShadow:C.sh}}>
            ＋ 新增動作
          </button>
          <button onClick={save} className="b-hov"
            style={{width:'100%',border:'none',height:mob?50:58,
              background:sv==='saved'?C.ok:C.pri,
              color:'#fff',fontWeight:800,fontSize:mob?14:17,cursor:'pointer',
              borderRadius:14,marginBottom:14,transition:'background .4s',
              boxShadow:`0 4px 16px ${sv==='saved'?C.ok:C.pri}55`}}>
            {sv==='saved'?'✅ 已儲存今日記錄':'💾 儲存今日訓練記錄'}
          </button>
          {isIOS&&!isStd&&(
            <div style={{background:C.card,border:`1.5px solid ${C.bdr}`,borderRadius:14,
              padding:'16px',textAlign:'center',boxShadow:C.sh}}>
              <div style={{fontWeight:800,color:C.pri,fontSize:14,marginBottom:6}}>📲 加到主畫面，像 App 一樣使用！</div>
              <div style={{color:C.sub,fontSize:12,lineHeight:1.8,fontWeight:600}}>
                Safari 底部 <strong style={{color:C.txt}}>⬆ 分享</strong> → <strong style={{color:C.txt}}>加入主畫面</strong>
              </div>
            </div>
          )}
        </div>
      )}
      {timer&&<RestTimer seconds={timer.seconds} onDone={()=>setTimer(null)} onSkip={()=>setTimer(null)}/>}
      {showAS&&<ASModal onClose={()=>setAS(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
