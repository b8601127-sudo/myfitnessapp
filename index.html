  lower:['深蹲','硬舉','腿推','腿伸展'],
};

const DR=90,DREPS=5,DS=4,SK='fitness_data';

// One-time migration: merge any data saved under old version keys
(function migrateLegacy(){
  const oldKeys=['fitness_v5','fitness_v6','fitness_v7','fitness_v8','fitness_v9'];
  try{
    let current={};
    try{current=JSON.parse(localStorage.getItem(SK)||'{}');}catch{}
    let changed=false;
    oldKeys.forEach(k=>{
      try{
        const old=JSON.parse(localStorage.getItem(k)||'{}');
        Object.keys(old).forEach(date=>{
          if(!current[date]){current[date]=old[date];changed=true;}
        });
        localStorage.removeItem(k);
      }catch{}
    });
    if(changed)localStorage.setItem(SK,JSON.stringify(current));
  }catch{}
})();
const p2=n=>String(n).padStart(2,'0');
const fT=s=>`${p2(Math.floor(s/60))}:${p2(s%60)}`;

function todayKey(){
  const d=new Date();
  return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
}
function todayTitle(){
  const d=new Date();
  const days=['日','一','二','三','四','五','六'];
  return`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（週${days[d.getDay()]}）`;
}
function fDL(k){
  const[y,m,d]=k.split('-');
  const dt=new Date(+y,+m-1,+d);
  return`${y}年${m}月${d}日（週${'日一二三四五六'[dt.getDay()]}）`;
}

const uid=()=>`${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
const nSet=(o={})=>({id:uid(),weight:10,reps:DREPS,rest:DR,done:false,...o});
const nEx=(name='')=>({id:uid(),name,sets:Array.from({length:DS},()=>nSet())});

function useMob(){
  const[m,sm]=useState(()=>window.innerWidth<768);
  useEffect(()=>{
    const f=()=>sm(window.innerWidth<768);
    window.addEventListener('resize',f);
    return()=>window.removeEventListener('resize',f);
  },[]);
  return m;
}

function MI({name, size=60}){
  const src = IMGS[name];
  if(!src) return (
    <svg viewBox="0 0 60 92" width={size} height={size} style={{display:'block',flexShrink:0}}>
      <ellipse cx="30" cy="8.5" rx="7" ry="7.5" fill="#B8CDE0"/>
      <path d="M16,20 C10,26 10,44 10,52 L50,52 C50,44 50,26 44,20 Z" fill="#B8CDE0"/>
    </svg>
  );
  // Fixed display box: keep aspect ratio, centre in square
  return (
    <div style={{
      width:size, height:size, display:'flex',
      alignItems:'center', justifyContent:'center',
      flexShrink:0, overflow:'hidden'
    }}>
      <img src={src} alt={name} style={{
        maxWidth:'100%', maxHeight:'100%',
        objectFit:'contain', display:'block'
      }}/>
    </div>
  );
}


/* ── Rest Timer ──────────────────────────────────────────────────── */
function RestTimer({seconds,onDone,onSkip}){
  const[rem,setRem]=useState(seconds);
  const ref=useRef();
  useEffect(()=>{
    ref.current=setInterval(()=>{
      setRem(r=>{if(r<=1){clearInterval(ref.current);onDone();return 0;}return r-1;});
    },1000);
    return()=>clearInterval(ref.current);
  },[]);
  const R=62,circ=2*Math.PI*R,prog=((seconds-rem)/seconds)*circ;
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(28,35,64,0.93)',zIndex:3000,
      display:'flex',alignItems:'center',justifyContent:'center',
      backdropFilter:'blur(16px)',WebkitBackdropFilter:'blur(16px)',
      paddingBottom:'max(env(safe-area-inset-bottom),24px)'}}>
      <div style={{background:'rgba(255,255,255,0.07)',borderRadius:24,padding:'36px 48px',
        display:'flex',flexDirection:'column',alignItems:'center',gap:20}}>
        <div style={{fontWeight:800,color:'rgba(255,255,255,0.4)',fontSize:11,letterSpacing:5}}>組間休息</div>
        <div style={{position:'relative',width:156,height:156}}>
          <svg width="156" height="156" style={{transform:'rotate(-90deg)',position:'absolute'}}>
            <circle cx="78" cy="78" r={R} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="10"/>
            <circle cx="78" cy="78" r={R} fill="none" stroke={C.pri2} strokeWidth="10"
              strokeDasharray={`${prog} ${circ}`} strokeLinecap="round"
              style={{transition:'stroke-dasharray 0.9s linear'}}/>
          </svg>
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',
            alignItems:'center',justifyContent:'center'}}>
            <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:64,color:'#fff',lineHeight:1}}>{rem}</span>
            <span style={{color:'rgba(255,255,255,0.35)',fontSize:12,fontWeight:700,letterSpacing:2}}>秒</span>
          </div>
        </div>
        <div style={{display:'flex',gap:8}}>
          {[[-15,'−15s'],[15,'+15s']].map(([d,l])=>(
            <button key={l} onClick={()=>setRem(r=>Math.max(0,r+d))} className="b-hov"
              style={{background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.15)',
                color:'rgba(255,255,255,0.7)',padding:'0 20px',height:44,borderRadius:10,
                fontWeight:700,fontSize:14,cursor:'pointer'}}>{l}</button>
          ))}
        </div>
        <button onClick={onSkip} className="b-hov"
          style={{background:C.pri,border:'none',color:'#fff',height:48,padding:'0 40px',
            borderRadius:12,fontWeight:800,fontSize:15,cursor:'pointer'}}>跳過休息</button>
      </div>
    </div>
  );
}

/* ── Stepper ─────────────────────────────────────────────────────── */
function Stepper({label,value,onChange,step=1,unit='',color=C.txt,mob=true}){
  const bs=mob?24:30,iw=mob?38:50,fs=mob?20:24;
  const dec=()=>onChange(Math.round(Math.max(0,parseFloat(value)-step)*100)/100);
  const inc=()=>onChange(Math.round((parseFloat(value)+step)*100)/100);
  const Btn=({fn,ch})=>(
    <button onClick={fn} style={{width:bs,height:bs,background:C.bg,border:`1.5px solid ${C.bdr}`,
      color:C.sub,cursor:'pointer',fontSize:mob?15:18,borderRadius:mob?5:7,flexShrink:0,
      display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,padding:0,lineHeight:1}}>
      {ch}
    </button>
  );
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:1,minWidth:0}}>
      <span style={{color:C.sub,fontSize:mob?9:10,fontWeight:800,letterSpacing:1,
        textTransform:'uppercase',whiteSpace:'nowrap'}}>{label}</span>
      <div style={{display:'flex',alignItems:'center',gap:mob?1:3}}>
        <Btn fn={dec} ch="−"/>
        <input type="number" value={value} onChange={e=>onChange(e.target.value)}
          style={{width:iw,textAlign:'center',background:'transparent',border:'none',
            borderBottom:`2px solid ${C.bdr}`,color,fontFamily:"'Bebas Neue',sans-serif",
            fontSize:fs,outline:'none',padding:0,minWidth:0,display:'block'}}/>
        <Btn fn={inc} ch="+"/>
      </div>
      {unit&&<span style={{color:C.bdr,fontSize:mob?9:10,fontWeight:700}}>{unit}</span>}
    </div>
  );
}

/* ── Set Row ─────────────────────────────────────────────────────── */
function SetRow({set,idx,onChange,onDelete,onDone,mob=true}){
  const actW=mob?56:80;
  return(
    <div style={{display:'grid',gridTemplateColumns:`${mob?16:22}px 1fr 1fr auto ${actW}px`,
      gap:mob?3:10,alignItems:'center',padding:mob?'9px 4px':'12px 8px',
      background:set.done?C.priL:'rgba(238,242,255,0.38)',
      borderLeft:`3px solid ${set.done?C.pri:'transparent'}`,
      borderRadius:8,marginBottom:4,transition:'border-color .25s,background .25s'}}>
      <span style={{color:C.bdr,fontWeight:800,fontSize:mob?11:13,textAlign:'center'}}>{idx+1}</span>
      <Stepper label="重量" value={set.weight} onChange={v=>onChange({...set,weight:v})} step={2.5} unit="kg" mob={mob}/>
      <Stepper label="次數" value={set.reps}   onChange={v=>onChange({...set,reps:v})}   step={1}   unit="次" mob={mob}/>
      {/* Rest: fixed 90s, display only */}
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:1}}>
        <span style={{color:C.sub,fontSize:mob?9:10,fontWeight:800,letterSpacing:1,textTransform:'uppercase'}}>休息</span>
        <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:mob?20:24,color:C.warn,lineHeight:1}}>{set.rest}</span>
        <span style={{color:C.bdr,fontSize:mob?9:10,fontWeight:700}}>秒</span>
      </div>
      <div style={{display:'flex',flexDirection:mob?'column':'row',gap:mob?4:6,
        alignItems:'center',justifyContent:'center',flexShrink:0,width:actW}}>
        <button onClick={()=>onDone(set)} className="b-hov"
          style={{width:mob?26:34,height:mob?26:34,flexShrink:0,
            background:set.done?C.pri:'transparent',
            border:`1.5px solid ${set.done?C.pri:C.bdr}`,
            color:set.done?'#fff':C.sub,cursor:'pointer',borderRadius:mob?6:8,
            fontSize:mob?12:14,display:'flex',alignItems:'center',justifyContent:'center',
            transition:'all .2s'}}>✓</button>
        <button onClick={onDelete} className="b-hov"
          style={{width:mob?26:34,height:mob?26:34,flexShrink:0,
            background:'transparent',border:`1.5px solid ${C.bdr}`,color:C.bdr,
            cursor:'pointer',borderRadius:mob?6:8,fontSize:mob?14:16,
            display:'flex',alignItems:'center',justifyContent:'center',
            transition:'color .2s'}}>×</button>
      </div>
    </div>
  );
}

/* ── Exercise Card ───────────────────────────────────────────────── */

/* ── Main App ────────────────────────────────────────────────────── */
function App(){
  const mob=useMob();
  const[history,setHist]=useState(()=>{
    try{return JSON.parse(localStorage.getItem(SK)||'{}')}catch{return{}}
  });
  const[view,setView]=useState('workout');
  const[phase,setPhase]=useState('idle'); // 'idle' | 'active'
  const[exercises,setEx]=useState([nEx()]);
  const[elapsed,setEl]=useState(0);
  const[timer,setTimer]=useState(null);
  const[showSaveConfirm,setShowSave]=useState(false);

  const iRef=useRef(null);
  const t0Ref=useRef(null);

  useEffect(()=>()=>clearInterval(iRef.current),[]);

  const startWorkout=()=>{
    t0Ref.current=Date.now();
    iRef.current=setInterval(()=>setEl(Math.floor((Date.now()-t0Ref.current)/1000)),1000);
    setPhase('active');
  };

  const doSave=()=>{
    const key=todayKey();
    const next={...history,[key]:{exercises,duration:elapsed,savedAt:Date.now()}};
    setHist(next);
    try{localStorage.setItem(SK,JSON.stringify(next))}catch{}
    // reset everything
    clearInterval(iRef.current);iRef.current=null;
    setEl(0);
    setEx([nEx()]);
    setPhase('idle');
    setView('workout');
    setTimer(null);
    setShowSave(false);
  };

  const deleteRecord=(key)=>{
    const next={...history};
    delete next[key];
    setHist(next);
    try{localStorage.setItem(SK,JSON.stringify(next))}catch{}
  };

  const onSetDone=(exId,set)=>{
    const nd=!set.done;

    // Auto-start workout when first check happens
    if(nd && phase==='idle'){
      t0Ref.current=Date.now();
      iRef.current=setInterval(()=>setEl(Math.floor((Date.now()-t0Ref.current)/1000)),1000);
      setPhase('active');
    }

    setEx(p=>p.map(e=>{
      if(e.id!==exId)return e;
      const setIdx=e.sets.findIndex(s=>s.id===set.id);
      const isFirstSet=setIdx===0;
      let newSets=e.sets.map(s=>s.id===set.id?{...s,done:nd}:s);

      // When first set of an exercise is checked, copy weight/reps/rest to all remaining sets
      if(nd && isFirstSet && newSets.length>1){
        newSets=newSets.map((s,i)=>
          i===0 ? s : {...s, weight:set.weight, reps:set.reps, rest:set.rest}
        );
      }
      return{...e,sets:newSets};
    }));

    if(nd&&parseInt(set.rest)>0)setTimer({seconds:parseInt(set.rest)});
  };

  const totS=exercises.reduce((s,e)=>s+e.sets.length,0);
  const doneS=exercises.reduce((s,e)=>s+e.sets.filter(x=>x.done).length,0);
  const totV=exercises.reduce((s,e)=>
    s+e.sets.reduce((ss,x)=>ss+(parseFloat(x.weight)||0)*(parseInt(x.reps)||0),0),0);
  const pct=totS?(doneS/totS)*100:0;
  const cp=mob?'14px':'32px';
  const mw=mob?700:920;
  const rR=mob?14:18;
  const isIOS=/iPhone|iPad/.test(navigator.userAgent);
  const isStd=!!window.navigator.standalone;

  // Shared header renderer
  const Header=({showStats=false})=>(
    <div style={{position:'sticky',top:0,zIndex:200,background:'rgba(255,255,255,0.96)',
      backdropFilter:'blur(14px)',WebkitBackdropFilter:'blur(14px)',
      borderBottom:`1px solid ${C.bdr}`,boxShadow:'0 1px 12px rgba(66,99,235,0.07)'}}>
      <div style={{maxWidth:mw,margin:'0 auto',padding:`0 ${cp}`}}>
        <div style={{display:'flex',alignItems:'center',gap:mob?8:12,
          padding:`${mob?'11px':'15px'} 0`}}>
          {/* Logo */}
          <div style={{width:mob?38:46,height:mob?38:46,flexShrink:0,
            background:`linear-gradient(135deg,${C.pri},${C.pri2})`,
            borderRadius:mob?12:14,display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:mob?22:28,boxShadow:`0 4px 14px ${C.pri}44`}}>💪</div>
          {/* Title + timer */}
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:900,fontSize:mob?16:20,color:C.txt,
              whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
              {todayTitle()}
            </div>
            {phase==='active'?(
              <div style={{display:'flex',alignItems:'center',gap:5,marginTop:1}}>
                <span style={{width:6,height:6,borderRadius:3,background:C.ok,
                  display:'inline-block',boxShadow:`0 0 0 2px ${C.okL}`}}/>
                <span style={{color:C.ok,fontFamily:"'Bebas Neue',sans-serif",
                  fontSize:mob?14:18,fontWeight:700,letterSpacing:1}}>{fT(elapsed)}</span>
              </div>
            ):(
              <div style={{color:C.bdr,fontSize:mob?11:13,fontWeight:600,marginTop:1}}>
                {phase==='idle'?'尚未開始計時':''}
              </div>
            )}
          </div>
          {/* Progress ring — only when active */}
          {phase==='active'&&(
            <svg width={mob?36:44} height={mob?36:44}
              style={{transform:'rotate(-90deg)',flexShrink:0}}>
              <circle cx={mob?18:22} cy={mob?18:22} r={rR}
                fill="none" stroke={C.bdr} strokeWidth="3.5"/>
              <circle cx={mob?18:22} cy={mob?18:22} r={rR}
                fill="none" stroke={C.pri} strokeWidth="3.5"
                strokeDasharray={`${(pct/100)*(2*Math.PI*rR).toFixed(1)} ${(2*Math.PI*rR).toFixed(1)}`}
                strokeLinecap="round"
                style={{transition:'stroke-dasharray .5s ease'}}/>
            </svg>
          )}
          {/* Nav tabs */}
          <div style={{display:'flex',gap:mob?4:6}}>
            {[['workout','訓練'],['history','歷史']].map(([v,l])=>(
              <button key={v} onClick={()=>setView(v)} className="b-hov"
                style={{background:view===v?C.pri:'transparent',
                  border:`1.5px solid ${view===v?C.pri:C.bdr}`,
                  color:view===v?'#fff':C.sub,
                  height:mob?34:40,padding:`0 ${mob?'11px':'18px'}`,
                  fontWeight:700,fontSize:mob?13:15,cursor:'pointer',
                  borderRadius:9,transition:'all .2s'}}>{l}</button>
            ))}
          </div>
        </div>
      </div>
      {/* Stats strip */}
      {showStats&&phase==='active'&&(
        <div style={{background:C.priL,borderTop:`1px solid ${C.bdr}`}}>
          <div style={{maxWidth:mw,margin:'0 auto',display:'flex',
            padding:`${mob?'7px':'9px'} ${cp}`,gap:mob?18:40}}>
            {[['動作',exercises.length],['總組數',totS],
              ['完成',`${doneS}/${totS}`],
              ['訓練量',totV?`${totV}kg`:'—']].map(([l,v])=>(
              <div key={l}>
                <div style={{color:C.pri,fontFamily:"'Bebas Neue',sans-serif",
                  fontSize:mob?21:28,lineHeight:1}}>{v}</div>
                <div style={{color:C.pri2,fontSize:mob?9:10,fontWeight:800,
                  letterSpacing:1.5,textTransform:'uppercase'}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      <Header showStats={view==='workout'}/>

      {/* ── History view ── */}
      {view==='history'&&(
        <HList history={history} onDelete={deleteRecord} onBack={()=>setView('workout')}/>
      )}

      {/* ── Workout view ── */}
      {view==='workout'&&(
        <div style={{maxWidth:mw,margin:'0 auto',padding:`16px ${cp} 100px`}}>

          {/* ── IDLE: big start button ── */}
          {phase==='idle'&&(
            <div style={{textAlign:'center',padding:`${mob?'40px':'60px'} 0 32px`}}>
              <div style={{color:C.sub,fontSize:mob?13:15,fontWeight:600,marginBottom:28}}>
                準備好了嗎？按下開始來計時
              </div>
              <button onClick={startWorkout} className="b-hov"
                style={{display:'inline-flex',alignItems:'center',justifyContent:'center',
                  gap:10,height:mob?60:70,padding:`0 ${mob?'36px':'48px'}`,
                  background:`linear-gradient(135deg,${C.pri},${C.pri2})`,
                  border:'none',color:'#fff',fontWeight:900,
                  fontSize:mob?18:22,cursor:'pointer',borderRadius:18,
                  boxShadow:`0 8px 28px ${C.pri}55`,letterSpacing:0.5,
                  transition:'transform .15s,box-shadow .15s'}}
                onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';
                  e.currentTarget.style.boxShadow=`0 12px 36px ${C.pri}66`;}}
                onMouseLeave={e=>{e.currentTarget.style.transform='none';
                  e.currentTarget.style.boxShadow=`0 8px 28px ${C.pri}55`;}}>
                <span style={{fontSize:mob?24:28}}>▶</span> 開始訓練
              </button>
              <div style={{color:C.bdr,fontSize:12,fontWeight:600,marginTop:16}}>
                計時器啟動後即可記錄各動作
              </div>
            </div>
          )}

          {/* Exercise cards — always shown so user can prep before starting */}
          {mob?(
            exercises.map(ex=>(
              <ExCard key={ex.id} ex={ex} mob={true}
                onUpdate={u=>setEx(p=>p.map(e=>e.id===u.id?u:e))}
                onDelete={()=>setEx(p=>p.filter(e=>e.id!==ex.id))}
                onSetDone={onSetDone}/>
            ))
          ):(
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18,marginBottom:4}}>
              {exercises.map(ex=>(
                <ExCard key={ex.id} ex={ex} mob={false}
                  onUpdate={u=>setEx(p=>p.map(e=>e.id===u.id?u:e))}
                  onDelete={()=>setEx(p=>p.filter(e=>e.id!==ex.id))}
                  onSetDone={onSetDone}/>
              ))}
            </div>
          )}

          <button onClick={()=>setEx(p=>[...p,nEx()])} className="b-hov"
            style={{width:'100%',background:C.card,border:`2px dashed ${C.bdr}`,
              color:C.sub,height:mob?50:58,fontWeight:800,fontSize:mob?14:17,
              cursor:'pointer',borderRadius:14,marginBottom:10,boxShadow:C.sh}}>
            ＋ 新增動作
          </button>

          {/* Save — only when active */}
          {phase==='active'&&(
            <button onClick={()=>setShowSave(true)} className="b-hov"
              style={{width:'100%',border:'none',height:mob?50:58,
                background:C.ok,color:'#fff',fontWeight:800,
                fontSize:mob?14:17,cursor:'pointer',borderRadius:14,
                boxShadow:`0 4px 16px ${C.ok}55`}}>
              💾 儲存今日訓練記錄
            </button>
          )}

          {/* PWA hint */}
          {isIOS&&!isStd&&(
            <div style={{marginTop:14,background:C.card,border:`1.5px solid ${C.bdr}`,
              borderRadius:14,padding:'14px 16px',textAlign:'center',boxShadow:C.sh}}>
              <div style={{fontWeight:800,color:C.pri,fontSize:13,marginBottom:4}}>
                📲 加到主畫面，像 App 一樣使用
              </div>
              <div style={{color:C.sub,fontSize:12,fontWeight:600,lineHeight:1.7}}>
                Safari 底部 <strong style={{color:C.txt}}>⬆ 分享</strong> →{' '}
                <strong style={{color:C.txt}}>加入主畫面</strong>
              </div>
            </div>
          )}
        </div>
      )}

      {/* Rest timer */}
      {timer&&(
        <RestTimer seconds={timer.seconds}
          onDone={()=>setTimer(null)}
          onSkip={()=>setTimer(null)}/>
      )}

      {/* Save confirm */}
      {showSaveConfirm&&(
        <ConfirmModal
          icon="💾"
          title="儲存今日訓練？"
          body="儲存後計時器與訓練內容將重置，恢復初始畫面。"
          confirmLabel="確認儲存"
          confirmColor={C.ok}
          onConfirm={doSave}
          onCancel={()=>setShowSave(false)}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
